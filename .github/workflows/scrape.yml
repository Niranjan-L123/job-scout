name: Job Scout

on:
  schedule:
    # Every 15 min on off-peak minutes — :00/:15/:30/:45 are GitHub's most
    # congested cron slots and scheduled runs there get delayed or skipped.
    - cron: "4,19,34,49 * * * *"
  workflow_dispatch:
    inputs:
      validate:
        description: "Validate config source slugs instead of scraping"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: job-scout
  cancel-in-progress: false

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Validate sources
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.validate }}
        run: python -m scraper.validate

      - name: Scrape
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.validate }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python -m scraper.main

      - name: Commit updated state
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.validate }}
        run: |
          git config user.name "job-scout"
          git config user.email "job-scout@users.noreply.github.com"
          git add data/seen.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update seen jobs"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
